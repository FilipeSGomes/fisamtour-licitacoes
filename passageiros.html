<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FISAM Tour | Passageiros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <div class="brand">
        <img src="./logo.png" alt="FISAM Tour" class="brand__logo" />
        <div class="brand__text">
          <div class="brand__name">FISAM TOUR</div>
          <div class="brand__tag">Cadastro de passageiros</div>
        </div>
      </div>
      <nav class="nav">
        <a class="nav__link" href="./index.html">Dashboard</a>
        <a class="nav__link" href="./licitacoes.html">Licitações</a>
        <a class="nav__link nav__link--active" href="./passageiros.html">Passageiros</a>
        <a class="nav__link" href="./tunas.html">TUNAS</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="alert" id="alert" hidden></div>
    <section class="panel">
      <div class="panel__row panel__row--simple">
        <div class="field">
          <label class="field__label">Buscar nome ou CPF</label>
          <input class="field__input" type="search" id="q" placeholder="Digite para buscar…" />
        </div>
      </div>
      <div class="panel__head">
        <h1 class="title">Passageiros</h1>
        <div class="muted" id="count">0 itens</div>
      </div>
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr><th>Nome</th><th>Data nasc.</th><th>CPF</th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/passageiros.js"></script>
</body>
</html>
